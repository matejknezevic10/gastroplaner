<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Gastro Planer Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #c9a961 0%, #8b6f47 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 4em;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 1.5em;
            color: #2C3E50;
            margin-bottom: 8px;
        }
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #c9a961, #8b6f47);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .status {
            margin-top: 24px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85em;
            display: none;
        }
        .status.online {
            background: #E8F5E9;
            color: #2E7D32;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Keine Internetverbindung</h1>
        <p>
            Gastro Planer Pro benötigt eine Internetverbindung für den Zugriff auf deine Daten. 
            Bitte prüfe deine WLAN- oder Mobilfunkverbindung.
        </p>
        <button class="btn" onclick="location.reload()">🔄 Erneut versuchen</button>
        <div class="status" id="online-status">
            ✅ Verbindung wiederhergestellt! Seite wird neu geladen...
        </div>
    </div>

    <script>
        // Automatisch neu laden wenn Verbindung zurück
        window.addEventListener('online', () => {
            document.getElementById('online-status').classList.add('online');
            setTimeout(() => location.reload(), 1500);
        });
    </script>
</body>
</html>
